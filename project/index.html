<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Exchange Skills</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SkillSwap</h1>
        <nav>
            <button id="signup-btn">Sign Up</button>
            <button id="signin-btn">Sign In</button>
            <button id="signout-btn" style="display:none;">Sign Out</button>
        </nav>
    </header>
    <main>
        <section id="auth-section">
            <div id="signup-form">
                <h2>Sign Up</h2>
                <form id="signup">
                    <input type="text" id="signup-username" placeholder="Username" required>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <button type="submit">Sign Up</button>
                </form>
                <p>Already have an account? <a href="#" id="switch-to-signin">Sign In</a></p>
            </div>
            <div id="signin-form" style="display:none;">
                <h2>Sign In</h2>
                <form id="signin">
                    <input type="text" id="signin-username" placeholder="Username" required>
                    <input type="password" id="signin-password" placeholder="Password" required>
                    <button type="submit">Sign In</button>
                </form>
                <p>Don't have an account? <a href="#" id="switch-to-signup">Sign Up</a></p>
            </div>
        </section>
        <section id="dashboard" style="display:none;">
            <h2>Welcome, <span id="user-name"></span>!</h2>
            <div id="user-skills">
                <h3>Your Skills</h3>
                <p>Offered: <span id="offered-skill">None</span></p>
                <p>Required: <span id="required-skill">None</span></p>
            </div>
            <form id="skill-form">
                <h3>Update Skills</h3>
                <input type="text" id="offer-skill" placeholder="Skill you offer" required>
                <input type="text" id="require-skill" placeholder="Skill you require" required>
                <button type="submit">Update</button>
            </form>
            <div id="matches">
                <h3>Potential Matches</h3>
                <ul id="match-list"></ul>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
